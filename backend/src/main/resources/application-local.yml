server:
  port: 8080

spring:
  application:
    name: hostel-mess-management
  
  datasource:
    url: jdbc:h2:mem:hmsdb
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  
  security:
    user:
      name: admin
      password: admin123

# JWT Configuration
jwt:
  secret: hmsSecretKey2024ForHostelMessManagementSystem
  expiration: 86400000

# Application Configuration
app:
  meal:
    cost: 60.0
    fine-per-day: 30.0
    payment-grace-days: 7
  upi:
    id: rintocherian2006@oksbi

logging:
  level:
    com.hms: DEBUG
    org.springframework.security: DEBUG
